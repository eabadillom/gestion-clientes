<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<p:dialog widgetVar="dlgSusProductos" header="Sus productos" showEffect="fade" modal="true" responsive="true" position="center top" width="100%">
		<p:dataList id="dl-sus-productos" widgetVar="dlSusProductos" value="#{mbEmisionSalidas.listaInventarioSelect}" var="inventario" type="definition" paginator="true" paginatorPosition="bottom" rows="10">
			<div class="p-grid ui-fluid">
				<div class="p-col-6 p-md-2" style="vertical-align: middle !important;">
					<p:inputText value="#{inventario.folioCliente}" style="text-align: center;"></p:inputText>
				</div>
				<div class="p-col-12 p-md-6" style="vertical-align: middle !important;">
					<p:inputText value="#{inventario.producto}" readonly="true" />
				</div>
				<div class="p-col-6 p-md-2" style="vertical-align: middle !important;">
					<p:inputNumber value="#{inventario.cantidad}" symbol=" #{inventario.unidad}" symbolPosition="s" readonly="true" inputStyleClass="input-number-width" inputStyle="text-align: right;" />
				</div>
				<div class="p-col-6 p-md-2" style="vertical-align: middle !important;">
					<p:inputNumber value="#{inventario.pesoAprox}" symbol=" kg" symbolPosition="s" readonly="true" inputStyleClass="input-number-width" inputStyle="text-align: right;"/>
				</div>
			</div>
			<f:facet name="footer">
				<div class="p-grid ui-fluid">
					<div class="p-col-12 p-md-8">
						<p:outputLabel value="#{mbEmisionSalidas.numeroProductos()} productos" />
					</div>
					<div class="p-col-6 p-md-2" style="text-align: right;">
						<p:outputLabel value="#{mbEmisionSalidas.cantidadTotal()} unidades" />
					</div>
					<div class="p-col-6 p-md-2" style="text-align: right;">
						<p:outputLabel value="#{mbEmisionSalidas.pesoTotal()} kg" />
					</div>
				</div>
			</f:facet>
		</p:dataList>
		<f:facet name="footer">
			<p:commandButton value="Cerrar" icon="pi pi-times" styleClass="ui-button-secondary" onclick="PF('dlgSusProductos').hide();">
			</p:commandButton>
		</f:facet>
	</p:dialog>

</ui:composition>
