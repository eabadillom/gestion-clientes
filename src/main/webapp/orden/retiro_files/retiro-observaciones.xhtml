<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

			<p:panel id="observaciones" header="Observaciones generales">
				<div class="p-grid ui-fluid p-col-12">
					<div class="p-col-12 p-md-9">
						<p:inputText value="#{mbEmisionSalidas.salida.observaciones}" maxlength="1000" placeholder="OBSERVACIONES GENERALES" oninput="this.value = this.value.toUpperCase()" >
							<p:ajax process="@this"/>
						</p:inputText>
					</div>
					<div class="p-col-12 p-md-3">
						<p:badge severity="danger" value="#{mbEmisionSalidas.archivosList.size()}" visible="#{mbEmisionSalidas.archivosList.size() > 0}">
							<p:commandButton value="Cargar archivos" icon="pi pi-cloud-upload" type="button" onclick="PF('dialogCarga').show()" process="@this">
							</p:commandButton>
						</p:badge>
					</div>
				</div>
			</p:panel>


</ui:composition>
