<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/WEB-INF/template.xhtml">
	<ui:define name="title">Estado de cuenta</ui:define>
	<ui:define name="head">
		<h:outputScript library="js" name="calendar_es_MX.js" />
	</ui:define>
	<ui:define name="content">
		<h:form id="form" enctype="multipart/form-data">
			<p:growl id="messages" showDetail="true" />
			<p:dialog modal="true" widgetVar="statusInfoDialog" header="Cargando información..." draggable="false" closable="false" resizable="false">
				<div align="center">
					<i class="pi pi-spinner pi-spin" style="font-size:3rem;"></i>
				</div>
			</p:dialog>
			<div class="p-grid ui-fluid">
				<div class="p-field p-col-6 p-md-2">
					<p:outputLabel value="Periodo" />
					<p:datePicker id="yearMonth" view="month" value="#{mbEstadoCuenta.mesActual}" pattern="MMMM yyyy" yearNavigator="true" maxdate="#{mbEstadoCuenta.maxDate}" locale="es_MX" timeZone="GMT-6">
						<p:ajax process="@this" />
						<p:ajax event="change" listener="#{mbEstadoCuenta.establecerPeriodo()}" />
					</p:datePicker>
				</div>
				<div class="p-field p-col-6 p-md-2">
					<p:outputLabel value="." style="color: rgba(255, 255, 255, 0);" />
					<p:commandButton value="Consultar" actionListener="#{mbEstadoCuenta.Consultar}" process="@this" styleClass="ui-button-raised ui-button-secondary" update="form:dt-estadoResultado" onclick="PF('statusInfoDialog').show();" oncomplete="PF('statusInfoDialog').hide();"/>
				</div>
			</div>
			<p:dataTable id="dt-estadoResultado" widgetVar="dtestadoResultado" var="movimiento" value="#{mbEstadoCuenta.listaestadoCuenta}" reflow="true" size="small">
				<p:columnGroup type="header">
					<p:row>
						<p:column colspan="5" style="text-align:right;" headerText="Saldo inicial:"/>
						<p:column style="text-align:right;">
							<f:facet name="header">
								<p:outputLabel value="#{mbEstadoCuenta.saldoInicial}">
									<f:convertNumber currencyCode="MXN" currencySymbol="$" locale="es_MX" type="currency" />
								</p:outputLabel>
							</f:facet>
						</p:column>
					</p:row>
					<p:row>
						<p:column colspan="1" style="text-align:center;" headerText="Fecha"/>
						<p:column colspan="1" style="text-align:center;" headerText="Movimiento"/>
						<p:column colspan="1" style="text-align:center;" headerText="Folio"/>
						<p:column colspan="1" style="text-align:right;" headerText="Cargos"/>
						<p:column colspan="1" style="text-align:right;" headerText="Abonos"/>
						<p:column colspan="1" style="text-align:right;" headerText="Saldo"/>
					</p:row>
				</p:columnGroup>
				<p:column style="text-align:center">
					<h:outputText value="#{movimiento.fecha}" >
					<f:convertDateTime pattern="dd/MM/yyyy"/>
					</h:outputText>
				</p:column>
				<p:column style="text-align:center">
					<h:outputText value="#{movimiento.movimiento}" />
				</p:column>
				<p:column style="text-align:center">
					<h:outputText value="#{movimiento.nomSerie}-#{movimiento.folio}" />
				</p:column>
				<p:column style="text-align: right;">
					<h:outputText value="#{movimiento.debe}" >
						<f:convertNumber currencyCode="MXN" currencySymbol="$" locale="es_MX" type="currency" />
					</h:outputText>
				</p:column>
				<p:column style="text-align: right;">
					<h:outputText value="#{movimiento.haber}" >
						<f:convertNumber currencyCode="MXN" currencySymbol="$" locale="es_MX" type="currency" />
					</h:outputText>
				</p:column>
				<p:column style="text-align: right;">
					<h:outputText value="#{movimiento.parcial}" >
						<f:convertNumber currencyCode="MXN" currencySymbol="$" locale="es_MX" type="currency" />
					</h:outputText>
				</p:column>
				<p:columnGroup type="footer">
					<p:row>
						<p:column colspan="5" style="text-align:right;" footerText="Saldo final:"/>
						<p:column style="text-align:right;">
							<f:facet name="footer">
								<p:outputLabel value="#{mbEstadoCuenta.saldoFinal}">
									<f:convertNumber pattern="$ #,##0.00" />
								</p:outputLabel>
							</f:facet>
						</p:column>
					</p:row>
				</p:columnGroup>			
			</p:dataTable>
			<div align="center">
				<p:commandButton value="Descargar" process="@this" actionListener="#{mbEstadoCuenta.exportarPDF}" styleClass="ui-button-secondary"  icon="pi pi-file-pdf" iconPos="left" ajax="false">
					<p:fileDownload value="#{mbEstadoCuenta.file}" />
				</p:commandButton>
			</div>
		</h:form>
	</ui:define>
</ui:composition>
