<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/WEB-INF/template.xhtml">

	<ui:define name="title">Reporte de Salidas</ui:define>

	<ui:define name="head">
		<h:outputScript library="js" name="calendar_es.js" />
		<link rel="shortcut icon" type="image/x-icon" href="#{resource['images/favicon.ico']}"/>
	</ui:define>

	<ui:define name="content">
		<h:form id="form" target="_blank">
			<div class="p-grid ui-fluid">
				<div class="p-col-12 p-md-12">
					<div class="card">
						<h5>Ingrese los datos requeridos</h5>
						<div class="p-grid p-formgrid">
							<div class="p-col-2 p-md-2">
								<p:outputLabel for="fechaInicio" value="Fecha inicio del periodo: " />
							</div>
							<div class="p-col-2 p-md-2">
								<p:datePicker id="fechaInicio" showIcon="true" styleClass="p-mr-4 p-mb-2" placeholder="Inicio periodo" value="#{mbSalidas.fechaInicio}"/>
							</div>
							<div class="p-col-2 p-md-2">
								<p:outputLabel for="fechaFin" value="Fecha fin del periodo: " />
							</div>
							<div class="p-col-2 p-md-2">
								<p:datePicker id="fechaFin" showIcon="true" styleClass="p-mr-4 p-mb-2" placeholder="Fin del periodo" value="#{mbSalidas.fechaFin}"/>
							</div>
							<div class="p-col-2 p-md-2">
                                                                <p:commandButton value="Consultar" process="@this fechaInicio fechaFin" rendered="true" ajax="false" actionListener="#{mbSalidas.generateReport}" styleClass="p-mr-2 p-mb-2" icon="pi pi-check" iconPos="right" >
                                                                </p:commandButton>
							</div>
						</div>
					</div>
				</div>
			</div>
				<div class="column-center">
			</div>
		</h:form>
	</ui:define>
</ui:composition>
